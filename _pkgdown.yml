url: https://predictiveecology.github.io/buckethost/

template:
  bootstrap: 5

reference:
- title: Discover
  desc: >
    Find what's in a bucket and build the URLs you read from.
  contents:
  - bucketLs
  - bucketUrl
  - bucketRaster
- title: Mutate
  desc: >
    Upload to and delete from a bucket. Thin, loud wrappers around rclone.
  contents:
  - bucketUpload
  - bucketDelete
- title: Maintain
  desc: >
    Generate the browsable HTML catalogue and check integrity.
  contents:
  - generateIndexes
  - bucketVerify
- title: Mirror
  desc: >
    Map a bucket's contents (and optional Google Drive source) to a manifest.
  contents:
  - makeMirrorManifest
- title: Configuration
  desc: >
    Resolve connection details from options / environment variables.
  contents:
  - bucketConfig
- title: Package
  contents:
  - buckethost-package
